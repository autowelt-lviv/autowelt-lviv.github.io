backend:
  name: github
  repo: autowelt-lviv/autowelt-lviv.github.io
  branch: main
  base_url: https://netlify-functions-oauth-for-github.netlify.app
  auth_endpoint: /.netlify/functions/oauth-start
  site_domain: autowelt.lviv.ua # optional but recommended

site_url: https://autowelt.lviv.ua
display_url: autowelt.lviv.ua

logo:
  src: /assets/img/logo.png
  show_in_header: true

media_folder: "assets/uploads/cars"   # where images are stored in repo
public_folder: "/assets/uploads/cars" # how the site references them

collections:
  - name: "cars"
    label: "Автомобілі"
    folder: "_cars"
    create: true
    slug: "{{slug}}-{{year}}{{month}}{{day}}{{hour}}{{minute}}{{second}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "car" }
      - { label: "Приховати оголошення", name: "post_hidden", widget: "boolean", default: false, required: false }
      - { label: "Дата публікації", name: "created_at", widget: "datetime", default: "{{now}}" }
      - { label: "Заголовок", name: "title", widget: "string", hint: "Наприклад: Land Rover Range Rover HSE" }
      - { label: "Вартість (USD)", name: "price_usd", widget: "number", required: false, hint: "Вартість вказати як ціле число без символів" }
      - { label: "Рік", name: "release_year", widget: "number", required: false, hint: "Показується на головних сторінках" }
      - { label: "Рік/Місяць", name: "alt_release_year", widget: "string", required: false, hint: "Альтернатива до поля Рік - показується тільки на сторінці повний опис авто. Якщо, ввести це поле, то Рік також бажано вказати." }
      - { label: "Двигун", name: "engine", widget: "string", required: false }
      - label: "Привід"
        name: "drive"
        widget: "select"
        required: false
        options:
          - { label: "Повний привід", value: "Повний привід" }
          - { label: "Передній привід",  value: "Передній привід" }
          - { label: "Задній привід",  value: "Задній привід" }
      - { label: "Продано", name: "is_sold", widget: "boolean", default: false, required: false }
      - { label: "Під завдатком", name: "under_deposit", widget: "boolean", default: false, required: false }
      - { label: "На площадці", name: "on_site", widget: "boolean", default: true, required: false }
      - label: "Фотографії"
        name: "photos"
        widget: "list"
        required: false
        field:
          label: "Фото"
          name: "photo"
          widget: "image"
          media_folder: "/assets/uploads/cars"
          public_folder: "/assets/uploads/cars"
      - { label: "Опис", name: "body", widget: "markdown", required: false }
      - { label: "Відео посилання", name: "video_url", widget: "string", required: false, hint: "https://www.instagram.com..." }
    sortable_fields: ["created_at", "title", "price_usd", "release_year"]
    view_groups:
      - label: "авто на площадці"
        field: "on_site"
    view_filters:
      - label: "Приховані"
        field: "post_hidden"
        pattern: true
      - label: "Продані"
        field: "is_sold"
        pattern: true
      - label: "Під завдатком"
        field: "under_deposit"
        pattern: true
      - label: "Не під завдатком"
        field: "under_deposit"
        pattern: false
      - label: "На площадці"
        field: "on_site"
        pattern: true
      - label: "В дорозі"
        field: "on_site"
        pattern: false
    summary: "{{post_hidden | ternary('🕶', '')}}{{is_sold | ternary('💰', '')}}{{on_site | ternary('', '🚢')}}{{under_deposit | ternary('💸', '  ')}} • {{created_at | date('YYYY-MM-DD')}} • {{title}} {{release_year}} ${{price_usd | default('_')}}"
  - name: "settings"
    label: "Налаштування сайту"
    files:
      - file: "_data/site.yml"
        label: "Сайт"
        name: "site"
        fields:
          - { label: "Опис біля логотипу", name: "hero_description", widget: "markdown" }
          - { label: "Номер телефону", name: "phone", widget: "string", hint: "+380000000000" }
          - { label: "Текст нижньої червоної кнопки: Подзвонити", name: "footer_call_button_text", widget: "string" }
          - { label: "Текст нижньої червоної кнопки: Мапа", name: "footer_map_button_text", widget: "string" }
          - { label: "Текст нижнього тексту захисту прав", name: "footer_copyright_text", widget: "string" }
          # WHERE TO FIND US BLOCK
          - label: "Сторінка: Де нас знайти"
            name: "where_to_find_us"
            widget: "object"
            fields:
              - { label: "Заголовок перед текстом як доїхати", name: "directions_title", widget: "string" }
              - { label: "Текст з інструкціями як доїхати", name: "directions_text", widget: "markdown" }
              - { label: "Google maps embed URL", name: "map_embed_url", widget: "string", hint: "https://www.google.com/maps/embed?..." }
              - { label: "Заголовок перед текстом про бізнес та послуги", name: "value_title", widget: "string" }
              - { label: "Текст про бізнес та послуги", name: "value_text", widget: "markdown" }
              # SOCIAL LINKS
              - { label: "Заголовок перед посиланнями на соцмережі", name: "socials_title", widget: "string" }
              - label: "Соцмережі"
                name: "socials"
                widget: "object"
                fields:
                  - { label: "Instagram", name: "instagram", widget: "string", required: false }
                  - { label: "Telegram", name: "telegram", widget: "string", required: false }
                  - { label: "TikTok", name: "tiktok", widget: "string", required: false }
              # PHOTOS ARRAY
              - label: "Фото майданчика"
                name: "photos"
                widget: "list"
                required: false
                field:
                  label: "Фото"
                  name: "photo"
                  widget: "image"
                  media_folder: "/assets/uploads/location"
                  public_folder: "/assets/uploads/location"
          - label: "SEO трафік"
            name: "seo-optimization"
            widget: "object"
            fields:
              - { label: "Google Analytics ID", name: "google-id", widget: "string", hint: "G-ABCDE0FJKL" }
              - { label: "Опис для людей які шукають у Google", name: "description_text", widget: "markdown" }
              - { label: "Сірий текст на головній сторінці у самому низу", name: "index-footer-about-text", widget: "markdown" }
              - { label: "Сторінка для AI ботів - початок, людям не видно", name: "auto-lviv-ai-hero", widget: "markdown" }
              - { label: "Сторінка для AI ботів - кінець, людям не видно", name: "auto-lviv-ai-footer", widget: "markdown" }